name: Build release package

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read package version
        id: version
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            if [ "${tag}" != "${VERSION}" ]; then
              echo "Tag ${tag} must match manifest version ${VERSION}."
              exit 1
            fi
          else
            tag="${VERSION}"
            if ! git ls-remote --tags origin "refs/tags/${tag}" | grep -q "refs/tags/${tag}"; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${tag}"
              git push origin "${tag}"
            fi
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" main.js manifest.json styles.css --clobber
          else
            gh release create "${tag}" main.js manifest.json styles.css --title "${tag}" --notes "Automated build for ${tag}."
          fi
